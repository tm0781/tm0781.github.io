<!DOCTYPE html>
<html>
<head>
    <title>Reflex Test: Neon Adventure</title>

    <style>
        body {
            margin: 0;
       background-image: url("images/wp9081278.jpg");
        background-size: cover; 
      background-size: cover; 
            color: white;
            font-family: Arial;
            overflow: hidden;
        }

        #game {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #title {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            font-size: 28px;
            color: cyan;
            text-shadow: 0 0 10px cyan;
        }

        #basket {
            position: absolute;
            bottom: 30px;
            width: 120px;
            height: 20px;
            background: linear-gradient(90deg, cyan, blue);
            border-radius: 20px;
            box-shadow: 0 0 20px cyan;
        }

        .part {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 6px;
            box-shadow: 0 0 15px;
        }

        .good { background: lime; box-shadow: 0 0 15px lime; }
        .bad { background: red; box-shadow: 0 0 15px red; }

        #score {
            position: absolute;
            top: 50px;
            left: 15px;
            font-size: 22px;
        }

        /* GAME OVER */
        #gameOver {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 40px;
            color: cyan;
            text-shadow: 0 0 15px cyan;
        }

        #gameOver button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            background: cyan;
            cursor: pointer;
            border-radius: 8px;
        }

        #gameOver button:hover {
            background: white;
        }

        /* TRAIL */
        .trail {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            background: cyan;
            box-shadow: 0 0 10px cyan;
        }
    </style>
</head>

<body>

<div id="game">
    <div id="title">⚡ Reflex Test: Neon Adventure ⚡</div>
    <div id="score">Score: 0</div>
    <div id="basket"></div>

    <div id="gameOver">
        💀 Game Over
        <button onclick="restart()">Restart</button>
    </div>
</div>

<script>
let basket = document.getElementById("basket");
let score = 0;
let speed = 20;
let running = true;

/* MOVE */
document.addEventListener("mousemove", (e) => {
    basket.style.left = (e.pageX - 60) + "px";
});

/* CREATE OBJECTS */
function createPart() {
    if (!running) return;

    let part = document.createElement("div");
    part.className = "part " + (Math.random() > 0.2 ? "good" : "bad");
    part.style.left = Math.random() * (window.innerWidth - 30) + "px";
    part.style.top = "0px";
    document.getElementById("game").appendChild(part);

    let fall = setInterval(() => {
        part.style.top = part.offsetTop + 5 + "px";

        if (
            part.offsetTop > window.innerHeight - 80 &&
            part.offsetLeft > basket.offsetLeft &&
            part.offsetLeft < basket.offsetLeft + 120
        ) {
            score += part.classList.contains("good") ? 10 : -20;
            updateScore();
            part.remove();
            clearInterval(fall);
        }

        if (part.offsetTop > window.innerHeight) {
            if (part.classList.contains("good")) score -= 10;
            updateScore();
            part.remove();
            clearInterval(fall);
        }

    }, speed);
}

/* SCORE */
function updateScore() {
    document.getElementById("score").innerText = "Score: " + score;

    if (score < -50) {
        running = false;
        document.getElementById("gameOver").style.display = "flex";
    }
}

/* RESTART */
function restart() {
    location.reload();
}

/* SPEED UP */
setInterval(() => {
    if (running && speed > 8) speed--;
}, 3000);

/* SPAWN */
setInterval(createPart, 800);

/* TRAIL */
let trail = [];
let length = 20;

for (let i = 0; i < length; i++) {
    let dot = document.createElement("div");
    dot.className = "trail";
    document.body.appendChild(dot);
    trail.push({x: 0, y: 0, el: dot});
}

document.addEventListener("mousemove", (e) => {
    trail[0].x = e.pageX;
    trail[0].y = e.pageY;
});

function animateTrail() {
    for (let i = 0; i < trail.length; i++) {
        let cur = trail[i];
        let next = trail[i - 1];

        if (i !== 0) {
            cur.x += (next.x - cur.x) * 0.4;
            cur.y += (next.y - cur.y) * 0.4;
        }

        cur.el.style.left = cur.x + "px";
        cur.el.style.top = cur.y + "px";
        cur.el.style.transform = `scale(${1 - i / length})`;
        cur.el.style.opacity = 1 - i / length;
    }

    requestAnimationFrame(animateTrail);
}

animateTrail();
</script>

</body>
</html>
