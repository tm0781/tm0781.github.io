<!DOCTYPE html>
<html>
<head>
    <title>Reflex Test: Neon Adventure</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial;
            background-image: url("background.jpg");
            background-size: cover;
            background-position: center;
            color: white;
        }

        #title {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            font-size: 32px;
            color: cyan;
            text-shadow: 0 0 15px cyan;
        }

        #score {
            position: absolute;
            top: 60px;
            left: 20px;
            font-size: 24px;
            text-shadow: 0 0 10px black;
        }

        #highscore {
            position: absolute;
            top: 95px;
            left: 20px;
            font-size: 20px;
            text-shadow: 0 0 10px black;
        }

        #basket {
            position: absolute;
            bottom: 40px;
            width: 140px;
            height: 20px;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            border-radius: 20px;
            box-shadow:
                0 0 10px cyan,
                0 0 20px cyan,
                0 0 40px purple;
        }

        .part {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 8px;
        }

        .good {
            background: #00ff99;
            box-shadow: 0 0 15px #00ff99;
        }

        .bad {
            background: red;
            box-shadow: 0 0 15px red;
        }

        #startScreen,
        #gameOver {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #gameOver {
            display: none;
        }

        h1 {
            font-size: 50px;
            color: cyan;
            text-shadow: 0 0 20px cyan;
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            background: cyan;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.1);
            background: white;
        }

        /* Rainbow trail */
        .trail {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>

<body>

<div id="title">⚡ Reflex Test: Neon Adventure ⚡</div>

<div id="score">Score: 0</div>
<div id="highscore">High Score: 0</div>

<div id="basket"></div>

<div id="startScreen">
    <h1>Reflex Test</h1>
    <button onclick="startGame()">PLAY</button>
</div>

<div id="gameOver">
    <h1>GAME OVER</h1>
    <button onclick="restartGame()">RESTART</button>
</div>

<script>
let basket = document.getElementById("basket");
let score = 0;
let gameRunning = false;
let speed = 18;

/* HIGH SCORE */
let highscore = localStorage.getItem("highscore") || 0;
document.getElementById("highscore").innerText =
"High Score: " + highscore;

/* START GAME */
function startGame() {
    document.getElementById("startScreen").style.display = "none";
    gameRunning = true;
}

/* RESTART */
function restartGame() {
    location.reload();
}

/* MOVE BASKET */
document.addEventListener("mousemove", e => {

    let x = e.pageX - 70;

    if (x < 0) x = 0;

    if (x > window.innerWidth - 140) {
        x = window.innerWidth - 140;
    }

    basket.style.left = x + "px";
});

/* CREATE BLOCKS */
function createPart() {

    if (!gameRunning) return;

    let part = document.createElement("div");

    if (Math.random() > 0.25) {
        part.className = "part good";
    } else {
        part.className = "part bad";
    }

    part.style.left =
        Math.random() * (window.innerWidth - 30) + "px";

    part.style.top = "0px";

    document.body.appendChild(part);

    let fall = setInterval(() => {

        part.style.top = part.offsetTop + 6 + "px";

        /* COLLISION */
        if (
            part.offsetTop > window.innerHeight - 90 &&
            part.offsetLeft > basket.offsetLeft &&
            part.offsetLeft < basket.offsetLeft + 140
        ) {

            if (part.classList.contains("good")) {
                score += 10;
            } else {
                score -= 20;
                shakeScreen();
            }

            updateScore();

            part.remove();
            clearInterval(fall);
        }

        /* MISSED */
        if (part.offsetTop > window.innerHeight) {

            if (part.classList.contains("good")) {
                score -= 10;
            }

            updateScore();

            part.remove();
            clearInterval(fall);
        }

    }, speed);
}

/* UPDATE SCORE */
function updateScore() {

    document.getElementById("score").innerText =
        "Score: " + score;

    if (score > highscore) {
        highscore = score;

        localStorage.setItem("highscore", highscore);

        document.getElementById("highscore").innerText =
            "High Score: " + highscore;
    }

    if (score < -50) {
        gameRunning = false;

        document.getElementById("gameOver").style.display = "flex";
    }
}

/* SCREEN SHAKE */
function shakeScreen() {

    document.body.style.transform = "translateX(10px)";

    setTimeout(() => {
        document.body.style.transform = "translateX(-10px)";
    }, 50);

    setTimeout(() => {
        document.body.style.transform = "translateX(0px)";
    }, 100);
}

/* SPAWN */
setInterval(createPart, 700);

/* HARDER OVER TIME */
setInterval(() => {

    if (speed > 8 && gameRunning) {
        speed--;
    }

}, 5000);

/* RAINBOW TRAIL */
let trail = [];

for (let i = 0; i < 20; i++) {

    let dot = document.createElement("div");

    dot.className = "trail";

    document.body.appendChild(dot);

    trail.push({
        x: 0,
        y: 0,
        el: dot
    });
}

document.addEventListener("mousemove", e => {

    trail[0].x = e.pageX;
    trail[0].y = e.pageY;
});

function animateTrail() {

    for (let i = 0; i < trail.length; i++) {

        let current = trail[i];
        let next = trail[i - 1];

        if (i !== 0) {

            current.x += (next.x - current.x) * 0.35;
            current.y += (next.y - current.y) * 0.35;
        }

        current.el.style.left = current.x + "px";
        current.el.style.top = current.y + "px";

        current.el.style.background =
            `hsl(${i * 20}, 100%, 50%)`;

        current.el.style.opacity =
            1 - i / trail.length;
    }

    requestAnimationFrame(animateTrail);
}

animateTrail();
</script>

</body>
</html>
