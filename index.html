<!DOCTYPE html>
<html>
<head>
    <title>PC Builder Game</title>

    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #0a0a0a, #000);
            color: white;
            font-family: Arial;
            overflow: hidden;
        }

        #game {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #basket {
            position: absolute;
            bottom: 30px;
            width: 120px;
            height: 20px;
            background: linear-gradient(90deg, cyan, blue);
            border-radius: 20px;
            box-shadow: 0 0 20px cyan;
        }

        .part {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 6px;
            box-shadow: 0 0 15px;
        }

        .good { background: lime; box-shadow: 0 0 15px lime; }
        .bad { background: red; box-shadow: 0 0 15px red; }

        #score {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 22px;
        }

        /* GAME OVER SCREEN */
        #gameOver {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 40px;
        }

        #gameOver button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            background: cyan;
            cursor: pointer;
        }

        /* TRAIL */
        .trail {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            background: cyan;
            box-shadow: 0 0 10px cyan;
        }
    </style>
</head>

<body>

<div id="game">
    <div id="score">Score: 0</div>
    <div id="basket"></div>

    <div id="gameOver">
        💀 Game Over
        <button onclick="restart()">Restart</button>
    </div>
</div>

<script>
let basket = document.getElementById("basket");
let game = document.getElementById("game");
let score = 0;
let speed = 20;
let running = true;

/* MOVE BASKET */
document.addEventListener("mousemove", (e) => {
    basket.style.left = (e.pageX - 60) + "px";
});

/* CREATE PARTS */
function createPart() {
    if (!running) return;

    let part = document.createElement("div");
    part.className = "part " + (Math.random() > 0.2 ? "good" : "bad");
    part.style.left = Math.random() * (window.innerWidth - 30) + "px";
    part.style.top = "0px";
    game.appendChild(part);

    let fall = setInterval(() => {
        part.style.top = part.offsetTop + 5 + "px";

        // catch
        if (
            part.offsetTop > window.innerHeight - 80 &&
            part.offsetLeft > basket.offsetLeft &&
            part.offsetLeft < basket.offsetLeft + 120
        ) {
            if (part.classList.contains("good")) {
                score += 10;
            } else {
                score -= 20;
            }

            updateScore();
            part.remove();
            clearInterval(fall);
        }

        // miss
        if (part.offsetTop > window.innerHeight) {
            if (part.classList.contains("good")) {
                score -= 10;
            }

            updateScore();
            part.remove();
            clearInterval(fall);
        }

    }, speed);
}

/* SCORE + GAME OVER */
function updateScore() {
    document.getElementById("score").innerText = "Score: " + score;

    if (score < -50) {
        running = false;
        document.getElementById("gameOver").style.display = "flex";
    }
}

/* RESTART */
function restart() {
    location.reload();
}

/* SPEED UP GAME */
setInterval(() => {
    if (running && speed > 8) speed--;
}, 3000);

/* SPAWN PARTS */
setInterval(createPart, 800);

/* TRAIL */
let trail = [];
let trailLength = 20;

for (let i = 0; i < trailLength; i++) {
    let dot = document.createElement("div");
    dot.className = "trail";
    document.body.appendChild(dot);
    trail.push({x: 0, y: 0, el: dot});
}

document.addEventListener("mousemove", (e) => {
    trail[0].x = e.pageX;
    trail[0].y = e.pageY;
});

function animateTrail() {
    for (let i = 0; i < trail.length; i++) {
        let current = trail[i];
        let next = trail[i - 1];

        if (i !== 0) {
            current.x += (next.x - current.x) * 0.4;
            current.y += (next.y - current.y) * 0.4;
        }

        current.el.style.left = current.x + "px";
        current.el.style.top = current.y + "px";

        current.el.style.transform = `scale(${1 - i / trail.length})`;
        current.el.style.opacity = 1 - i / trail.length;
    }

    requestAnimationFrame(animateTrail);
}

animateTrail();
</script>

</body>
</html>
