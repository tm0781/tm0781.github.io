<!DOCTYPE html>
<html>
<head>
<title>Reflex Test: Neon Adventure</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    color: white;
    background: url("background.jpg") no-repeat center center/cover;
}

/* UI */
#title {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    font-size: 30px;
    color: cyan;
    text-shadow: 0 0 15px cyan;
}

#score, #high {
    position: absolute;
    left: 15px;
    font-size: 20px;
}
#score { top: 50px; }
#high { top: 80px; }

#basket {
    position: absolute;
    bottom: 40px;
    width: 140px;
    height: 20px;
    background: linear-gradient(90deg, cyan, purple);
    border-radius: 20px;
    box-shadow: 0 0 25px cyan;
}

/* blocks */
.part {
    position: absolute;
    width: 30px;
    height: 30px;
    border-radius: 6px;
}
.good { background: #00ffcc; box-shadow: 0 0 15px #00ffcc; }
.bad { background: #ff0044; box-shadow: 0 0 15px red; }

/* screens */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

button {
    padding: 12px 25px;
    margin-top: 20px;
    font-size: 18px;
    background: cyan;
    border: none;
    cursor: pointer;
}

/* trail */
.trail {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
}
</style>
</head>

<body>

<div id="title">⚡ Reflex Test: Neon Adventure ⚡</div>
<div id="score">Score: 0</div>
<div id="high">High Score: 0</div>
<div id="basket"></div>

<div id="start" class="screen">
<h1>Start Game</h1>
<button onclick="start()">Play</button>
</div>

<div id="over" class="screen" style="display:none;">
<h1>Game Over</h1>
<button onclick="restart()">Restart</button>
</div>

<script>
let basket = document.getElementById("basket");
let score = 0;
let running = false;
let speed = 20;

// HIGH SCORE
let high = localStorage.getItem("high") || 0;
document.getElementById("high").innerText = "High Score: " + high;

// MOVE
document.addEventListener("mousemove", e => {
    basket.style.left = (e.pageX - 70) + "px";
});

// START
function start(){
    document.getElementById("start").style.display = "none";
    running = true;
}

// CREATE BLOCKS
function spawn(){
    if(!running) return;

    let p = document.createElement("div");
    p.className = "part " + (Math.random()>0.2?"good":"bad");
    p.style.left = Math.random()*window.innerWidth+"px";
    p.style.top = "0px";
    document.body.appendChild(p);

    let fall = setInterval(()=>{
        p.style.top = p.offsetTop+6+"px";

        // catch
        if(p.offsetTop>window.innerHeight-90 &&
           p.offsetLeft>basket.offsetLeft &&
           p.offsetLeft<basket.offsetLeft+140){

            if(p.classList.contains("good")){
                score+=10;
                beep(800);
            } else {
                score-=20;
                shake();
                beep(200);
            }

            update();
            p.remove();
            clearInterval(fall);
        }

        // miss
        if(p.offsetTop>window.innerHeight){
            if(p.classList.contains("good")) score-=10;
            update();
            p.remove();
            clearInterval(fall);
        }

    },speed);
}

setInterval(spawn,700);

// SCORE
function update(){
    document.getElementById("score").innerText="Score: "+score;

    if(score>high){
        high=score;
        localStorage.setItem("high",high);
        document.getElementById("high").innerText="High Score: "+high;
    }

    if(score<-50){
        running=false;
        document.getElementById("over").style.display="flex";
        beep(100);
    }
}

// RESTART
function restart(){ location.reload(); }

// SCREEN SHAKE
function shake(){
    document.body.style.transform="translate(5px)";
    setTimeout(()=>document.body.style.transform="translate(-5px)",50);
    setTimeout(()=>document.body.style.transform="translate(0)",100);
}

// SOUND
function beep(freq){
    let ctx=new AudioContext();
    let o=ctx.createOscillator();
    let g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value=freq;
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.2);
}

// RAINBOW TRAIL
let trail=[];
for(let i=0;i<20;i++){
    let d=document.createElement("div");
    d.className="trail";
    document.body.appendChild(d);
    trail.push({x:0,y:0,el:d});
}

document.addEventListener("mousemove",e=>{
    trail[0].x=e.pageX;
    trail[0].y=e.pageY;
});

function animate(){
    for(let i=0;i<trail.length;i++){
        let t=trail[i];
        let n=trail[i-1];

        if(i!==0){
            t.x+=(n.x-t.x)*0.4;
            t.y+=(n.y-t.y)*0.4;
        }

        t.el.style.left=t.x+"px";
        t.el.style.top=t.y+"px";
        t.el.style.background=`hsl(${i*20},100%,50%)`;
    }
    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
