<!DOCTYPE html>
<html>
<head>
    <title>Reflex Test: Neon Adventure</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial;
            color: white;
            background: url("background.jpg") no-repeat center center/cover;
        }

        #game {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #title {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 32px;
            color: cyan;
            text-shadow: 0 0 15px cyan;
        }

        #score {
            position: absolute;
            top: 70px;
            left: 20px;
            font-size: 22px;
        }

        #basket {
            position: absolute;
            bottom: 40px;
            width: 140px;
            height: 20px;
            background: linear-gradient(90deg, cyan, purple);
            border-radius: 20px;
            box-shadow: 0 0 25px cyan;
        }

        .part {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 6px;
            box-shadow: 0 0 15px;
        }

        .good { background: #00ffcc; }
        .bad { background: #ff0055; }

        /* SCREENS */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 18px;
            background: cyan;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: white;
        }

        /* TRAIL */
        .trail {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            background: cyan;
            box-shadow: 0 0 10px cyan;
        }

        /* PARTICLES */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: cyan;
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>

<body>

<div id="game">
    <div id="title">⚡ Reflex Test: Neon Adventure ⚡</div>
    <div id="score">Score: 0</div>
    <div id="basket"></div>

    <div id="startScreen" class="screen">
        <h1>⚡ Reflex Test ⚡</h1>
        <p>Catch GOOD blocks • Avoid RED</p>
        <button onclick="startGame()">Start Game</button>
    </div>

    <div id="gameOver" class="screen" style="display:none;">
        <h1>💀 Game Over</h1>
        <button onclick="restart()">Play Again</button>
    </div>
</div>

<script>
let basket = document.getElementById("basket");
let score = 0;
let running = false;
let speed = 20;
let combo = 0;

/* START */
function startGame() {
    document.getElementById("startScreen").style.display = "none";
    running = true;
}

/* MOVE */
document.addEventListener("mousemove", (e) => {
    basket.style.left = (e.pageX - 70) + "px";
});

/* CREATE PART */
function createPart() {
    if (!running) return;

    let part = document.createElement("div");
    part.className = "part " + (Math.random() > 0.2 ? "good" : "bad");
    part.style.left = Math.random() * (window.innerWidth - 30) + "px";
    part.style.top = "0px";
    document.getElementById("game").appendChild(part);

    let fall = setInterval(() => {
        part.style.top = part.offsetTop + 6 + "px";

        if (
            part.offsetTop > window.innerHeight - 90 &&
            part.offsetLeft > basket.offsetLeft &&
            part.offsetLeft < basket.offsetLeft + 140
        ) {
            if (part.classList.contains("good")) {
                combo++;
                score += 10 + combo;
                explode(part.offsetLeft, part.offsetTop);
            } else {
                score -= 20;
                combo = 0;
            }

            updateScore();
            part.remove();
            clearInterval(fall);
        }

        if (part.offsetTop > window.innerHeight) {
            if (part.classList.contains("good")) {
                score -= 10;
                combo = 0;
            }
            updateScore();
            part.remove();
            clearInterval(fall);
        }

    }, speed);
}

/* PARTICLE EFFECT */
function explode(x, y) {
    for (let i = 0; i < 10; i++) {
        let p = document.createElement("div");
        p.className = "particle";
        p.style.left = x + "px";
        p.style.top = y + "px";
        document.body.appendChild(p);

        let dx = (Math.random() - 0.5) * 10;
        let dy = (Math.random() - 0.5) * 10;

        let life = setInterval(() => {
            p.style.left = p.offsetLeft + dx + "px";
            p.style.top = p.offsetTop + dy + "px";
            p.style.opacity -= 0.05;

            if (p.style.opacity <= 0) {
                p.remove();
                clearInterval(life);
            }
        }, 20);
    }
}

/* SCORE */
function updateScore() {
    document.getElementById("score").innerText = "Score: " + score;

    if (score < -50) {
        running = false;
        document.getElementById("gameOver").style.display = "flex";
    }
}

/* RESTART */
function restart() {
    location.reload();
}

/* SPAWN + SPEED */
setInterval(createPart, 700);
setInterval(() => {
    if (running && speed > 8) speed--;
}, 3000);

/* TRAIL */
let trail = [];
for (let i = 0; i < 20; i++) {
    let dot = document.createElement("div");
    dot.className = "trail";
    document.body.appendChild(dot);
    trail.push({x: 0, y: 0, el: dot});
}

document.addEventListener("mousemove", (e) => {
    trail[0].x = e.pageX;
    trail[0].y = e.pageY;
});

function animateTrail() {
    for (let i = 0; i < trail.length; i++) {
        let cur = trail[i];
        let next = trail[i - 1];

        if (i !== 0) {
            cur.x += (next.x - cur.x) * 0.4;
            cur.y += (next.y - cur.y) * 0.4;
        }

        cur.el.style.left = cur.x + "px";
        cur.el.style.top = cur.y + "px";
        cur.el.style.opacity = 1 - i / trail.length;
    }

    requestAnimationFrame(animateTrail);
}
animateTrail();
</script>

</body>
</html>
