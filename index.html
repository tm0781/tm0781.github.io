<!DOCTYPE html>
<html>
<head>
    <title>PC Builder Game</title>

    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            color: white;
            font-family: Arial;
            overflow: hidden;
        }

        #game {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #basket {
            position: absolute;
            bottom: 30px;
            width: 120px;
            height: 20px;
            background: cyan;
            border-radius: 20px;
            box-shadow: 0 0 15px cyan;
        }

        .part {
            position: absolute;
            width: 30px;
            height: 30px;
            background: orange;
            border-radius: 6px;
            box-shadow: 0 0 10px orange;
        }

        #score {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 22px;
        }

        /* trail dots */
        .trail {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            background: cyan;
            opacity: 0.7;
            box-shadow: 0 0 10px cyan;
        }
    </style>
</head>

<body>

<div id="game">
    <div id="score">Score: 0</div>
    <div id="basket"></div>
</div>

<script>
let basket = document.getElementById("basket");
let game = document.getElementById("game");
let score = 0;

/* =====================
   BASKET MOVEMENT
===================== */
document.addEventListener("mousemove", (e) => {
    basket.style.left = (e.pageX - 60) + "px";
});

/* =====================
   FALLING PARTS
===================== */
function createPart() {
    let part = document.createElement("div");
    part.className = "part";
    part.style.left = Math.random() * (window.innerWidth - 30) + "px";
    part.style.top = "0px";
    game.appendChild(part);

    let fall = setInterval(() => {
        part.style.top = part.offsetTop + 5 + "px";

        // catch
        if (
            part.offsetTop > window.innerHeight - 80 &&
            part.offsetLeft > basket.offsetLeft &&
            part.offsetLeft < basket.offsetLeft + 120
        ) {
            score += 10;
            document.getElementById("score").innerText = "Score: " + score;
            part.remove();
            clearInterval(fall);
        }

        // miss
        if (part.offsetTop > window.innerHeight) {
            score -= 5;
            document.getElementById("score").innerText = "Score: " + score;
            part.remove();
            clearInterval(fall);
        }

    }, 20);
}

setInterval(createPart, 900);

/* =====================
   SUPER COOL TRAIL
===================== */
let trail = [];
let trailLength = 15;

// create trail elements
for (let i = 0; i < trailLength; i++) {
    let dot = document.createElement("div");
    dot.className = "trail";
    document.body.appendChild(dot);
    trail.push({x: 0, y: 0, el: dot});
}

document.addEventListener("mousemove", (e) => {
    trail[0].x = e.pageX;
    trail[0].y = e.pageY;
});

// animate trail
function animateTrail() {
    for (let i = 0; i < trail.length; i++) {
        let current = trail[i];
        let next = trail[i - 1];

        if (i !== 0) {
            current.x += (next.x - current.x) * 0.4;
            current.y += (next.y - current.y) * 0.4;
        }

        current.el.style.left = current.x + "px";
        current.el.style.top = current.y + "px";

        // fade + size effect
        current.el.style.transform = `scale(${1 - i / trail.length})`;
        current.el.style.opacity = 1 - i / trail.length;
    }

    requestAnimationFrame(animateTrail);
}

animateTrail();
</script>

</body>
</html>\
